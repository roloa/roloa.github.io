<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Three Match Mock</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div class="sky-decor sky-decor-left"></div>
      <div class="sky-decor sky-decor-right"></div>
      <div class="cloud cloud-one"></div>
      <div class="cloud cloud-two"></div>
      <div class="cloud cloud-three"></div>

      <main class="game-screen">
        <header class="topbar">
          <div class="status-panel goals-panel">
            <div class="panel-title">Goals</div>
            <div class="goal-list">
              <div class="goal-card">
                <div class="goal-icon goal-icon-flower"></div>
                <strong class="goal-value">18</strong>
              </div>
              <div class="goal-card">
                <div class="goal-icon goal-icon-crate"></div>
                <strong class="goal-value">12</strong>
              </div>
            </div>
          </div>

          <div class="status-panel moves-panel">
            <div class="panel-title">Moves</div>
            <div class="moves-display">
              <strong class="moves-value">25</strong>
            </div>
          </div>
        </header>

        <section class="board-section">
          <div class="board-frame">
            <div class="board-grid" id="board-grid" aria-hidden="true"></div>
            <div class="piece-layer" id="piece-layer" aria-label="Puzzle board"></div>
          </div>
        </section>

        <footer class="inventory-panel">
          <div class="inventory-slots">
            <div class="inventory-slot">
              <div class="slot-inner">
                <div class="slot-plus"></div>
              </div>
            </div>
            <div class="inventory-slot">
              <div class="slot-inner">
                <div class="slot-plus"></div>
              </div>
            </div>
            <div class="inventory-slot">
              <div class="slot-inner">
                <div class="slot-plus"></div>
              </div>
            </div>
            <div class="inventory-slot">
              <div class="slot-inner">
                <div class="slot-plus"></div>
              </div>
            </div>
          </div>
        </footer>
      </main>
    </div>

    <script src="./script.js"></script>
  </body>
</html>
