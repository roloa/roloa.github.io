<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>NovelAI Random Image</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .diamond {
            position: relative;
            width: 80%;
            height: 250px;
            margin: 50px;
        }

        .diamond button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        /* 1番目 → 上 */
        .diamond button:nth-child(1) {
            transform: translate(-50%, -150%);
        }

        /* 2番目 → 左（中央から左へ） */
        .diamond button:nth-child(2) {
            transform: translate(-150%, -50%);
        }

        /* 3番目 → 右（中央から右へ） */
        .diamond button:nth-child(3) {
            transform: translate(50%, -50%);
        }

        /* 4番目 → 下 */
        .diamond button:nth-child(4) {
            transform: translate(-50%, 50%);
        }
    </style>
</head>

<body>




    <div id="canvas" class="canvas">
        <a id="img_anchor" href="image.html">
            <img id="canvas_img" />
        </a>
    </div>
    <div>プロンプト:</div>
    <div id="prompt" class="diamond"></div>
    <h1><a href="novelai.html">Image Search</a></h1>
    <script>


        document.body.addEventListener("keydown", body_on_key_down);

        function body_on_key_down(e) {

        }

        let indexData = [];

        // index.json を読み込む
        fetch("index.json")
            .then(res => res.json())
            .then(data => {
                indexData = data;
                render("audino");
            })

        // ゲームパッド入力
        let gamepadIndex = null;

        // 接続検知
        window.addEventListener("gamepadconnected", (e) => {
            console.log("Gamepad connected:", e.gamepad);
            gamepadIndex = e.gamepad.index;
        });

        // 呼び出される関数
        function onButtonPressed(buttonIndex) {
            console.log("ボタン押された:", buttonIndex);

            if (buttonIndex === 0) {
                getNthButton(2).click();
            }
            if (buttonIndex === 1) {
                getNthButton(3).click();
            }
            if (buttonIndex === 2) {
                getNthButton(0).click();
            }
            if (buttonIndex === 3) {
                getNthButton(1).click();
            }

        }

        function getNthButton(n) {
            const container = document.getElementById("prompt");
            const buttons = container.querySelectorAll("button");
            return buttons[n] || null;
        }

        let prevButtons = [];

        function update() {
            if (gamepadIndex !== null) {
                const gamepad = navigator.getGamepads()[gamepadIndex];

                if (gamepad) {
                    gamepad.buttons.forEach((button, index) => {
                        const wasPressed = prevButtons[index] || false;

                        if (button.pressed && !wasPressed) {
                            onButtonPressed(index);
                        }

                        prevButtons[index] = button.pressed;
                    });
                }
            }

            requestAnimationFrame(update);
        }

        update();

        function getItemById(id) {
            for (const item of indexData) {
                if (item.id == id) {
                    return item;
                }
            }
            return null;
        }

        function getItemByTag(tag) {

            let loopCounter = 0;

            while ((loopCounter++) < 10000) {

                let indexCursor = Math.floor(Math.random() * indexData.length);
                const item = indexData[indexCursor];
                if (item) {
                    const promptConcat = (item.prompt + " " + item.character_prompt + " " + item.top_folder).toLowerCase();

                    if (promptConcat.includes(tag)) {
                        return item;
                    }
                }
            }
            return null;
        }

        function render(tag) {

            let item = getItemByTag(tag)

            if (!item) {
                return;
            }

            const img = document.getElementById("canvas_img");
            const a = document.getElementById("img_anchor");

            img.id = "canvas_img";
            img.src = item.path;
            a.href = "image.html?id=" + item.id;

            render_prompt(tag, item);

        }

        function render_prompt(first_tag, item) {
            const all_prompt_list = item.prompt
                .split(",")
                .map(s => s.trim())
                .filter(s => s.length > 0);

            // シャッフルして先頭3つを取得
            const selected_prompt_list = [...all_prompt_list]
                .sort(() => Math.random() - 0.5)
                .slice(0, 3)
            // 
            selected_prompt_list.unshift(first_tag);

            const container = document.getElementById("prompt");
            container.innerHTML = "";

            selected_prompt_list.forEach(prompt => {
                // buttonタグを作成
                const button = document.createElement("button");

                // リンクテキスト
                button.textContent = prompt;

                button.onclick = (() => { render(prompt); });

                // div#prompt に追加
                container.appendChild(button);

            });
        }
    </script>

</body>

</html>
