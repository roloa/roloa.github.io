<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>NovelAI Image Search</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    


    <div id="canvas" class="canvas"></div>
    <div>ID:<a id="image_id" href=""></a></div>
    <div>プロンプト:</div>
    <div id="prompt"></div>
    <h1><a href="novelai.html">Image Search</a></h1>
    <script>


        document.body.addEventListener("keydown", body_on_key_down);

        function body_on_key_down(e) {

        }

        let indexData = [];

        // index.json を読み込む
        fetch("index.json")
            .then(res => res.json())
            .then(data => {
                indexData = data;
                render();
            })

        function getItemById(id) {
            for (const item of indexData) {
                if (item.id == id) {
                    return item;
                }
            }
            return null;
        }

        function render() {

            const params = new URLSearchParams(window.location.search);

            // 個別に取得
            const id = params.get("id");

            if (!id) {
                return;
            }
            item = getItemById(id);

            if (!item) {
                return;
            }
            const img = document.createElement("img");
            img.src = item.path;
            canvasDiv = document.getElementById("canvas");
            canvasDiv.appendChild(img);

            const id_div = document.getElementById("image_id");
            id_div.textContent = id;
            id_div.href = "novelai.html?result_type=result_near_id&result_count=16&query=id:" + id;

            render_prompt();

        }

        function render_prompt() {
            const prompt_list = item.prompt
                .split(",")
                .map(s => s.trim())
                .filter(s => s.length > 0);


            const container = document.getElementById("prompt");

            prompt_list.forEach(prompt => {
                // aタグを作成
                const a = document.createElement("a");

                // GETパラメータを安全に付与
                a.href = "novelai.html?query=" + encodeURIComponent(prompt);

                // リンクテキスト
                a.textContent = prompt;

                // 必要なら見た目用に改行
                const br = document.createElement("br");

                // div#prompt に追加
                container.appendChild(a);
                container.appendChild(br);

            });
        }
    </script>

</body>

</html>
